<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <!-- Blob decorativo -->
  <ellipse cx="1050" cy="150" rx="280" ry="220" fill="#FFF4E0" opacity="0.8"/>
  <ellipse cx="150" cy="500" rx="200" ry="160" fill="#FFF4E0" opacity="0.6"/>
  <!-- Logo -->
  <text x="600" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" text-anchor="middle" fill="#1A1A1A">dinoro</text>
  <text x="820" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" text-anchor="start" fill="#F5A623">.mx</text>
  <!-- Tagline -->
  <text x="600" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" text-anchor="middle" fill="#6B7280">Compara los mejores préstamos en México</text>
  <!-- Badges -->
  <rect x="290" y="390" width="180" height="48" rx="24" fill="#F0FDF4"/>
  <text x="380" y="421" font-family="system-ui, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#16A34A">✓ Sin buró</text>
  <rect x="510" y="390" width="180" height="48" rx="24" fill="#FFF4E0"/>
  <text x="600" y="421" font-family="system-ui, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#92400E">Solo con INE</text>
  <rect x="730" y="390" width="180" height="48" rx="24" fill="#F0FDF4"/>
  <text x="820" y="421" font-family="system-ui, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#16A34A">100% gratis</text>
  <!-- URL -->
  <text x="600" y="530" font-family="system-ui, sans-serif" font-size="22" text-anchor="middle" fill="#9CA3AF">dinoro.mx</text>
</svg>
